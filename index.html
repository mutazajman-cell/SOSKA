<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JNPRADAR — Поиск офферов</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #fff;
      --line: #dde3ea;
      --text: #1c1f23;
      --muted: #6b7280;
      --primary: #1f5eff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input,
    button {
      font: inherit;
    }

    .search-input,
    .chat-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }

    .toggle-btn,
    .send-btn,
    .action-btn,
    .back-btn {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
    }

    .toggle-btn,
    .back-btn {
      background: #eef2f7;
      color: var(--text);
    }

    .send-btn,
    .action-btn {
      background: var(--primary);
      color: #fff;
    }

    .offers-wrap {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .offer-btn {
      min-width: 220px;
      text-align: left;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      cursor: pointer;
    }

    .offer-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .detail-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    .chat-title {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .chat-box {
      max-height: 320px;
      overflow: auto;
      padding: 8px;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px solid var(--line);
    }

    .msg {
      max-width: 86%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 12px;
    }

    .msg-buyer {
      margin-left: auto;
      background: #e7f0ff;
    }

    .msg-supplier {
      margin-right: auto;
      background: #fff;
      border: 1px solid var(--line);
    }

    .msg-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .actions-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>

<body>
  <main id="app" class="app"></main>

  <script>
    window.__SUPABASE_URL__ = "https://wafrjwwkdpokzfbpjgoo.supabase.co";
    window.__SUPABASE_ANON_KEY__ = "sb_publishable_z3MHuEU2oc6B_BcSm4rDsg_mqZeJ4Cn";

    // DATA LAYER
    const db = {
      buyers: [{ id: null, name: "Demo Buyer" }],
      suppliers: [],
      offers: [],
      inquiries: [],
      chats: [],
      messages: []
    };

    const state = {
      mode: "buyer",
      buyerId: null,
      query: "",
      selectedOfferId: null,
      selectedSupplierChatId: null,
      dataSource: "fallback"
    };

    const modelPool = [
      "Dell Latitude 7430",
      "HP EliteBook 840 G9",
      "Lenovo ThinkPad T14 Gen 3",
      "MacBook Pro 14 M1",
      "ASUS ZenBook 14",
      "Acer Swift 5",
      "Dell XPS 13",
      "HP ProBook 450 G9",
      "Lenovo Yoga 7",
      "MacBook Air M2"
    ];

    function hasSupabase() {
      return Boolean(window.__SUPABASE_URL__ && window.__SUPABASE_ANON_KEY__);
    }

    function sbHeaders() {
      return {
        apikey: window.__SUPABASE_ANON_KEY__,
        Authorization: `Bearer ${window.__SUPABASE_ANON_KEY__}`,
        "Content-Type": "application/json",
        Prefer: "return=representation"
      };
    }

    // SERVICE LAYER
    function makeConfigurationFromRow(cfg) {
      if (!cfg) return "N/A";
      const parts = [cfg.cpu, cfg.ram, cfg.ssd, cfg.screen, cfg.form_factor, cfg.notes].filter(Boolean);
      return parts.length ? parts.join(" / ") : "N/A";
    }

    async function loadDataFromSupabase() {
      if (!hasSupabase()) return false;

      try {
        const [offersRes, suppliersRes, cfgRes, modelsRes] = await Promise.all([
          fetch(
            `${window.__SUPABASE_URL__}/rest/v1/offers?select=id,supplier_id,configuration_id,price_aed,qty_text,stock_status,condition,grade,created_at,updated_at&stock_status=eq.active`,
            { headers: sbHeaders() }
          ),
          fetch(
            `${window.__SUPABASE_URL__}/rest/v1/suppliers?select=id,name,status&status=eq.active`,
            { headers: sbHeaders() }
          ),
          fetch(
            `${window.__SUPABASE_URL__}/rest/v1/model_configurations?select=id,model_id,cpu,ram,ssd,screen,form_factor,notes,status&status=eq.active`,
            { headers: sbHeaders() }
          ),
          fetch(
            `${window.__SUPABASE_URL__}/rest/v1/models?select=id,brand,model_name,status&status=eq.active`,
            { headers: sbHeaders() }
          )
        ]);

        if (!offersRes.ok || !suppliersRes.ok || !cfgRes.ok || !modelsRes.ok) {
          return false;
        }

        const offersRows = await offersRes.json();
        const suppliersRows = await suppliersRes.json();
        const cfgRows = await cfgRes.json();
        const modelsRows = await modelsRes.json();

        const suppliersById = new Map(suppliersRows.map((s) => [s.id, s]));
        const cfgById = new Map(cfgRows.map((c) => [c.id, c]));
        const modelsById = new Map(modelsRows.map((m) => [m.id, m]));

        db.suppliers = suppliersRows.map((s) => ({
          id: s.id,
          name: s.name || "Unknown supplier",
          language: "en",
          status: s.status || "active"
        }));

        db.offers = offersRows.map((row) => {
          const cfg = cfgById.get(row.configuration_id) || null;
          const mdl = cfg ? modelsById.get(cfg.model_id) || null : null;
          const modelName = mdl ? [mdl.brand, mdl.model_name].filter(Boolean).join(" ").trim() : "Unknown model";

          return {
            id: row.id,
            supplier_id: row.supplier_id,
            configuration_id: row.configuration_id,
            model: modelName || "Unknown model",
            configuration: makeConfigurationFromRow(cfg),
            price: row.price_aed ?? 0,
            currency: "AED",
            quantity: row.qty_text || "N/A",
            description: [row.condition, row.grade, row.stock_status].filter(Boolean).join(" · ") || "Без описания",
            stock_status: row.stock_status || "active",
            created_at: row.created_at,
            updated_at: row.updated_at,
            supplier_name: suppliersById.get(row.supplier_id)?.name || "Unknown supplier"
          };
        });

        state.dataSource = "supabase";
        return true;
      } catch {
        return false;
      }
    }

    async function loadSupplierThreads() {
      if (!hasSupabase()) {
        return db.chats.map((c) => {
          const related = db.messages
            .filter((m) => m.thread_id === c.id)
            .sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));

          return {
            thread: c,
            inquiry: db.inquiries.find((i) => i.id === c.inquiry_id) || null,
            offer: getOffer(c.offer_id) || null,
            lastMessage: related[0] || null
          };
        });
      }

      const [threadsRes, inquiriesRes, messagesRes] = await Promise.all([
        fetch(
          `${window.__SUPABASE_URL__}/rest/v1/chat_threads?select=*&thread_status=eq.active&order=created_at.desc`,
          { headers: sbHeaders() }
        ),
        fetch(
          `${window.__SUPABASE_URL__}/rest/v1/inquiries?select=*`,
          { headers: sbHeaders() }
        ),
        fetch(
          `${window.__SUPABASE_URL__}/rest/v1/chat_messages?select=*&order=created_at.desc`,
          { headers: sbHeaders() }
        )
      ]);

      if (!threadsRes.ok || !inquiriesRes.ok || !messagesRes.ok) {
        return [];
      }

      const threads = await threadsRes.json();
      const inquiries = await inquiriesRes.json();
      const messages = await messagesRes.json();
      const inquiryById = new Map(inquiries.map((i) => [i.id, i]));

      return threads.map((thread) => {
        const inquiry = inquiryById.get(thread.inquiry_id) || null;
        const offer = getOffer(thread.offer_id) || getOffer(inquiry?.offer_id) || null;
        const lastMessage = messages.find((m) => m.thread_id === thread.id) || null;

        return {
          thread,
          inquiry,
          offer,
          lastMessage
        };
      });
    }

    function seedDataFallback() {
      db.suppliers = [
        { id: "sup-1", name: "TechBridge LLC", language: "en", status: "active" },
        { id: "sup-2", name: "NoteLine FZE", language: "en", status: "active" },
        { id: "sup-3", name: "Gulf Devices Trading", language: "ar", status: "active" }
      ];

      db.offers = [];
      let offerIndex = 1;

      db.suppliers.forEach((supplier, supIdx) => {
        for (let i = 0; i < 10; i++) {
          const model = modelPool[i % modelPool.length];

          db.offers.push({
            id: `offer-${offerIndex++}`,
            supplier_id: supplier.id,
            configuration_id: `cfg-${supplier.id}-${i}`,
            model,
            configuration: `${16 + (i % 3) * 8}GB RAM / ${256 + (i % 4) * 256}GB SSD`,
            price: 2800 + supIdx * 250 + i * 55,
            currency: "AED",
            quantity: `${2 + (i % 6)} шт.`,
            description: "used · A grade · active",
            stock_status: "active",
            created_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
          });
        }
      });

      const firstOffer = db.offers[0];
      const inquiry = getOrCreateInquiryFallback(firstOffer);
      const thread = getOrCreateThreadFallback(inquiry, firstOffer);

      sendMessageFallback({
        thread,
        inquiry,
        senderType: "supplier",
        senderDisplayName: getSupplierName(firstOffer.supplier_id),
        originalText: "Здравствуйте! Товар в наличии.",
        originalLanguage: "en"
      });
    }

    function mockTranslate(text) {
      return `[AI translation] ${text}`;
    }

    async function getOrCreateInquiry(offer) {
      if (!hasSupabase()) return getOrCreateInquiryFallback(offer);

      const existingRes = await fetch(
        `${window.__SUPABASE_URL__}/rest/v1/inquiries?select=*&offer_id=eq.${encodeURIComponent(offer.id)}&limit=1`,
        { headers: sbHeaders() }
      );

      const existing = existingRes.ok ? await existingRes.json() : [];
      if (existing.length) return existing[0];

      const payload = {
        offer_id: offer.id,
        supplier_id: offer.supplier_id,
        buyer_id: null,
        status: "active"
      };

      const createRes = await fetch(`${window.__SUPABASE_URL__}/rest/v1/inquiries`, {
        method: "POST",
        headers: sbHeaders(),
        body: JSON.stringify(payload)
      });

      if (!createRes.ok) throw new Error("inquiry create failed");
      return (await createRes.json())[0];
    }

    function getOrCreateInquiryFallback(offer) {
      let inquiry = db.inquiries.find((i) => i.offer_id === offer.id);

      if (!inquiry) {
        inquiry = {
          id: `inq-${offer.id}`,
          offer_id: offer.id,
          supplier_id: offer.supplier_id,
          buyer_id: null,
          status: "active",
          created_at: new Date().toISOString()
        };

        db.inquiries.push(inquiry);
      }

      return inquiry;
    }

    async function getOrCreateChatThread(inquiry, offer) {
      if (!hasSupabase()) return getOrCreateThreadFallback(inquiry, offer);

      const existingRes = await fetch(
        `${window.__SUPABASE_URL__}/rest/v1/chat_threads?select=*&inquiry_id=eq.${encodeURIComponent(inquiry.id)}&limit=1`,
        { headers: sbHeaders() }
      );

      const existing = existingRes.ok ? await existingRes.json() : [];
      if (existing.length) return existing[0];

      const payload = {
        inquiry_id: inquiry.id,
        offer_id: offer.id,
        buyer_id: null,
        supplier_id: offer.supplier_id,
        thread_status: "active",
        buyer_language: "ru",
        supplier_language: "en",
        translation_status: "enabled"
      };

      const createRes = await fetch(`${window.__SUPABASE_URL__}/rest/v1/chat_threads`, {
        method: "POST",
        headers: sbHeaders(),
        body: JSON.stringify(payload)
      });

      if (!createRes.ok) throw new Error("thread create failed");
      return (await createRes.json())[0];
    }

    function getOrCreateThreadFallback(inquiry, offer) {
      let thread = db.chats.find((c) => c.inquiry_id === inquiry.id);

      if (!thread) {
        thread = {
          id: `thread-${inquiry.id}`,
          inquiry_id: inquiry.id,
          offer_id: offer.id,
          buyer_id: null,
          supplier_id: offer.supplier_id,
          thread_status: "active",
          buyer_language: "ru",
          supplier_language: "en",
          translation_status: "enabled",
          created_at: new Date().toISOString()
        };

        db.chats.push(thread);
      }

      return thread;
    }

    async function sendMessage({ thread, inquiry, senderType, senderDisplayName, originalText, originalLanguage }) {
      if (!hasSupabase()) {
        return sendMessageFallback({ thread, inquiry, senderType, senderDisplayName, originalText, originalLanguage });
      }

      const msgPayload = {
        thread_id: thread.id,
        inquiry_id: inquiry.id,
        sender_type: senderType,
        sender_display_name: senderDisplayName,
        original_text: originalText,
        original_language: originalLanguage,
        message_status: "sent"
      };

      const msgRes = await fetch(`${window.__SUPABASE_URL__}/rest/v1/chat_messages`, {
        method: "POST",
        headers: sbHeaders(),
        body: JSON.stringify(msgPayload)
      });

      if (!msgRes.ok) throw new Error("chat_messages insert failed");

      const msg = (await msgRes.json())[0];

      const trPayload = {
        message_id: msg.id,
        thread_id: thread.id,
        language_from: originalLanguage,
        language_to: "en",
        translated_text: mockTranslate(originalText),
        translation_status: "translated",
        provider: "mock"
      };

      const trRes = await fetch(`${window.__SUPABASE_URL__}/rest/v1/message_translations`, {
        method: "POST",
        headers: sbHeaders(),
        body: JSON.stringify(trPayload)
      });

      if (!trRes.ok) throw new Error("message_translations insert failed");
      return msg;
    }

    function sendMessageFallback({ thread, inquiry, senderType, senderDisplayName, originalText, originalLanguage }) {
      const msg = {
        id: `msg-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
        thread_id: thread.id,
        inquiry_id: inquiry.id,
        sender_type: senderType,
        sender_display_name: senderDisplayName,
        original_text: originalText,
        original_language: originalLanguage,
        message_status: "sent",
        translated_text: mockTranslate(originalText),
        translated_language: "en",
        translation_status: "translated",
        provider: "mock",
        created_at: new Date().toISOString()
      };

      db.messages.push(msg);
      return msg;
    }

    async function loadThreadMessages(threadId) {
      if (!hasSupabase()) {
        return db.messages
          .filter((m) => m.thread_id === threadId)
          .sort((a, b) => (a.created_at || "").localeCompare(b.created_at || ""));
      }

      const [msgRes, trRes] = await Promise.all([
        fetch(
          `${window.__SUPABASE_URL__}/rest/v1/chat_messages?select=*&thread_id=eq.${encodeURIComponent(threadId)}&order=created_at.asc`,
          { headers: sbHeaders() }
        ),
        fetch(
          `${window.__SUPABASE_URL__}/rest/v1/message_translations?select=*&thread_id=eq.${encodeURIComponent(threadId)}`,
          { headers: sbHeaders() }
        )
      ]);

      if (!msgRes.ok) return [];

      const messages = await msgRes.json();
      const translations = trRes.ok ? await trRes.json() : [];
      const trMap = new Map(translations.map((t) => [t.message_id, t]));

      return messages.map((m) => ({
        ...m,
        translated_text: trMap.get(m.id)?.translated_text || ""
      }));
    }

    const getSupplierName = (id) => db.suppliers.find((s) => s.id === id)?.name || "Unknown";
    const getOffer = (id) => db.offers.find((o) => o.id === id);

    function formatPrice(value) {
      const n = Number(value || 0);
      return Number.isFinite(n) ? n.toLocaleString("en-US") : String(value || 0);
    }

    // UI LAYER
    function render() {
      const app = document.getElementById("app");
      app.innerHTML = "";

      const header = document.createElement("div");
      header.className = "card";

      header.innerHTML = `
        <div class="row" style="justify-content:space-between">
          <h1>JNPRADAR</h1>
          <button class="toggle-btn" id="modeToggle">
            ${state.mode === "buyer" ? "Supplier view" : "Buyer view"}
          </button>
        </div>
        <div class="muted">Покупатель по умолчанию: ${db.buyers[0].name} · Source: ${state.dataSource}</div>
      `;

      app.appendChild(header);

      header.querySelector("#modeToggle").onclick = () => {
        state.mode = state.mode === "buyer" ? "supplier" : "buyer";
        state.selectedOfferId = null;
        state.selectedSupplierChatId = null;
        render();
      };

      if (state.mode === "buyer") {
        renderBuyer(app);
      } else {
        renderSupplier(app);
      }
    }

    function renderBuyer(app) {
      if (!state.selectedOfferId) {
        const search = document.createElement("div");
        search.className = "card";

        search.innerHTML = `<input class="search-input" placeholder="Введите модель..." value="${state.query}">`;

        search.querySelector("input").oninput = (e) => {
          state.query = e.target.value;
          render();
        };

        app.appendChild(search);

        const matches = db.offers.filter((o) => o.model.toLowerCase().includes(state.query.trim().toLowerCase()));

        const res = document.createElement("div");
        res.className = "card";

        if (!state.query.trim()) {
          res.innerHTML = `<div class="empty">Введите модель, чтобы увидеть офферы.</div>`;
        } else if (!matches.length) {
          res.innerHTML = `<div class="empty">Совпадений не найдено.</div>`;
        } else {
          const wrap = document.createElement("div");
          wrap.className = "offers-wrap";

          matches.forEach((offer) => {
            const b = document.createElement("button");
            b.className = "offer-btn";

            b.innerHTML = `
              <div class="offer-title">${offer.model}</div>
              <div class="muted">${offer.configuration}</div>
              <div class="muted">${formatPrice(offer.price)} ${offer.currency || "AED"} · ${offer.quantity}</div>
              <div class="muted">${getSupplierName(offer.supplier_id)}</div>
            `;

            b.onclick = () => {
              state.selectedOfferId = offer.id;
              render();
            };

            wrap.appendChild(b);
          });

          res.appendChild(wrap);
        }

        app.appendChild(res);
      } else {
        renderOfferDetail(app, state.selectedOfferId, "buyer");
      }
    }

    async function renderSupplier(app) {
      if (!state.selectedSupplierChatId) {
        const list = document.createElement("div");
        list.className = "card";
        list.innerHTML = `<div class="chat-title">Входящие чаты поставщика</div>`;

        const items = await loadSupplierThreads();

        if (!items.length) {
          list.innerHTML += `<div class="empty">Входящих чатов пока нет.</div>`;
        } else {
          items.forEach((item) => {
            const offer = item.offer || {};
            const m = item.lastMessage || {};

            const b = document.createElement("button");
            b.className = "offer-btn";
            b.style.width = "100%";
            b.style.marginBottom = "8px";

            b.innerHTML = `
              <div class="offer-title">${offer.model || "Unknown model"}</div>
              <div class="muted">${offer.configuration || "N/A"}</div>
              <div class="muted">Поставщик: ${getSupplierName(offer.supplier_id)}</div>
              <div class="muted">Последнее: ${m.original_text || "—"}</div>
              <div class="muted">Время: ${m.created_at || item.thread?.created_at || "—"}</div>
            `;

            b.onclick = () => {
              state.selectedSupplierChatId = item.thread.id;
              state.selectedOfferId = offer.id;
              render();
            };

            list.appendChild(b);
          });
        }

        app.appendChild(list);
      } else {
        renderOfferDetail(app, state.selectedOfferId, "supplier", state.selectedSupplierChatId);
      }
    }

    function renderOfferDetail(app, offerId, role, forcedChatId = null) {
      const offer = getOffer(offerId);

      if (!offer) {
        const err = document.createElement("div");
        err.className = "card";
        err.innerHTML = `<div class="empty">Оффер не найден.</div>`;
        app.appendChild(err);
        return;
      }

      const wrap = document.createElement("div");
      wrap.className = "card";

      wrap.innerHTML = `
        <button class="back-btn" id="backBtn">← Назад</button>
        <div class="detail-label">Модель</div><div>${offer.model}</div>
        <div class="detail-label">Конфигурация</div><div>${offer.configuration}</div>
        <div class="detail-label">Цена</div><div>${formatPrice(offer.price)} ${offer.currency || "AED"}</div>
        <div class="detail-label">Количество</div><div>${offer.quantity}</div>
        <div class="detail-label">Поставщик</div><div>${getSupplierName(offer.supplier_id)}</div>
        <div class="detail-label">Описание</div><div>${offer.description}</div>
      `;

      app.appendChild(wrap);

      wrap.querySelector("#backBtn").onclick = () => {
        if (role === "buyer") {
          state.selectedOfferId = null;
        } else {
          state.selectedSupplierChatId = null;
          state.selectedOfferId = null;
        }

        render();
      };

      const chat = document.createElement("div");
      chat.className = "card";

      chat.innerHTML = `
        <div class="chat-title">Чат с продавцом</div>
        <div class="chat-box" id="chatBox"><div class="empty">Загрузка...</div></div>
        <div class="row" style="margin-top:10px">
          <input class="chat-input" id="msgInput" placeholder="Введите сообщение"/>
          <button class="send-btn" id="sendBtn">Отправить</button>
        </div>
        <div class="actions-row">
          <button class="action-btn">Проверка</button>
          <button class="action-btn">Оплата</button>
        </div>
      `;

      app.appendChild(chat);

      hydrateChat(chat, offer, role, forcedChatId).catch(() => {
        chat.querySelector("#chatBox").innerHTML = `<div class="empty">Ошибка загрузки чата.</div>`;
      });
    }

    async function hydrateChat(chatCard, offer, role, forcedChatId = null) {
      const inquiry = await getOrCreateInquiry(offer);

      const thread = forcedChatId
        ? {
            id: forcedChatId,
            inquiry_id: inquiry.id,
            offer_id: offer.id,
            supplier_id: offer.supplier_id,
            buyer_id: null
          }
        : await getOrCreateChatThread(inquiry, offer);

      const box = chatCard.querySelector("#chatBox");
      const msgs = await loadThreadMessages(thread.id);

      if (!msgs.length) {
        box.innerHTML = `<div class="empty">Сообщений пока нет.</div>`;
      } else {
        box.innerHTML = "";

        msgs.forEach((m) => {
          const d = document.createElement("div");
          d.className = `msg ${(m.sender_type || "") === "buyer" ? "msg-buyer" : "msg-supplier"}`;

          d.innerHTML = `
            <div>${m.original_text || ""}</div>
            <div class="msg-meta">${m.translated_text || ""}</div>
          `;

          box.appendChild(d);
        });
      }

      box.scrollTop = box.scrollHeight;

      chatCard.querySelector("#sendBtn").onclick = async () => {
        const input = chatCard.querySelector("#msgInput");
        const text = input.value.trim();

        if (!text) return;

        await sendMessage({
          thread,
          inquiry,
          senderType: role === "buyer" ? "buyer" : "supplier",
          senderDisplayName: role === "buyer" ? db.buyers[0].name : getSupplierName(offer.supplier_id),
          originalText: text,
          originalLanguage: role === "buyer" ? "ru" : "en"
        });

        input.value = "";
        await hydrateChat(chatCard, offer, role, thread.id);
      };
    }

    async function init() {
      const loaded = await loadDataFromSupabase();

      if (!loaded) {
        seedDataFallback();
        state.dataSource = "fallback";
      }

      render();
    }

    init();
  </script>
</body>
</html>
