<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JNPRADAR — dealcore.me</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #fff;
      --line: #dbe2ea;
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #1d4ed8;
      --brand-soft: #e8efff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .site-header {
      background: #fff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-inner, .container {
      width: min(1180px, 92vw);
      margin: 0 auto;
    }
    .header-inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .muted { color: var(--muted); }

    .container { padding: 28px 0 42px; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
    }
    .hero h1 { margin: 0 0 8px; font-size: 34px; }
    .hero p { margin: 0 0 14px; color: var(--muted); }

    input, button { font: inherit; }
    .search-input, .chat-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 13px;
      font-size: 16px;
    }

    .offers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 12px;
    }
    .offer-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 13px;
      text-align: left;
      cursor: pointer;
    }
    .offer-model {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .meta {
      font-size: 13px;
      color: var(--muted);
      margin-top: 3px;
    }

    .btn, .btn-secondary {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
    }
    .btn { background: var(--brand); color: #fff; }
    .btn-secondary { background: #eef2f7; color: var(--text); }

    .offer-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 18px;
    }
    .label { font-size: 12px; color: var(--muted); }
    .chat-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    .chat-box {
      max-height: 350px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fbff;
      padding: 10px;
    }
    .msg {
      max-width: 84%;
      border-radius: 12px;
      padding: 10px;
      margin: 8px 0;
    }
    .msg-buyer {
      margin-left: auto;
      background: var(--brand-soft);
    }
    .msg-supplier {
      margin-right: auto;
      background: #fff;
      border: 1px solid var(--line);
    }
    .translated {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      border-top: 1px dashed #d5ddeb;
      padding-top: 6px;
    }
    .chat-row {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .actions-row {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .empty { color: var(--muted); }

    @media (max-width: 900px) {
      .hero h1 { font-size: 28px; }
      .offer-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">JNPRADAR</div>
      <div class="muted">Покупатель: Demo Buyer</div>
    </div>
  </header>

  <main id="app" class="container"></main>

  <script>
    // DATA LAYER
    const dataStore = {
      suppliers: [],
      buyers: [],
      offers: [],
      chats: [],
      messages: []
    };

    const state = {
      buyerId: 'buyer-1',
      query: '',
      selectedOfferId: null
    };

    const supabaseConfig = {
      url: window.__SUPABASE_URL__ || '',
      anonKey: window.__SUPABASE_ANON_KEY__ || ''
    };

    function seedFallbackData() {
      dataStore.buyers = [
        {
          id: 'buyer-1',
          name: 'Demo Buyer',
          language: 'ru',
          role: 'buyer',
          created_at: new Date().toISOString()
        }
      ];

      dataStore.suppliers = [
        { id: 'sup-1', name: 'TechBridge LLC', language: 'en', status: 'active', created_at: new Date().toISOString() },
        { id: 'sup-2', name: 'NoteLine FZE', language: 'en', status: 'active', created_at: new Date().toISOString() },
        { id: 'sup-3', name: 'Gulf Devices Trading', language: 'ar', status: 'active', created_at: new Date().toISOString() }
      ];

      const modelPool = [
        'Dell Latitude 7430',
        'HP EliteBook 840 G9',
        'Lenovo ThinkPad T14 Gen 3',
        'MacBook Pro 14 M1',
        'ASUS ZenBook 14',
        'Acer Swift 5',
        'Dell XPS 13',
        'HP ProBook 450 G9',
        'Lenovo Yoga 7',
        'MacBook Air M2'
      ];

      let offerIndex = 1;

      dataStore.suppliers.forEach((supplier, supplierIndex) => {
        for (let i = 0; i < 10; i++) {
          dataStore.offers.push({
            id: `offer-${offerIndex++}`,
            supplier_id: supplier.id,
            model: modelPool[i],
            configuration: `${16 + (i % 3) * 8}GB RAM / ${256 + (i % 4) * 256}GB SSD`,
            price: 2800 + supplierIndex * 240 + i * 60,
            currency: 'AED',
            quantity: 2 + (i % 6),
            description: `Краткое описание: ${modelPool[i]} в наличии, быстрая отгрузка и проверка перед сделкой.`,
            status: 'active',
            created_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
          });
        }
      });
    }

    // SERVICE LAYER
    async function loadDataFromSupabase() {
      if (!supabaseConfig.url || !supabaseConfig.anonKey) return false;

      try {
        const headers = {
          apikey: supabaseConfig.anonKey,
          Authorization: `Bearer ${supabaseConfig.anonKey}`
        };

        const [suppliersRes, offersRes] = await Promise.all([
          fetch(`${supabaseConfig.url}/rest/v1/suppliers?select=id,name,language,status,created_at&status=eq.active`, { headers }),
          fetch(`${supabaseConfig.url}/rest/v1/offers?select=id,supplier_id,model,configuration,price,currency,quantity,description,status,created_at,updated_at&status=eq.active`, { headers })
        ]);

        if (!suppliersRes.ok || !offersRes.ok) return false;

        dataStore.suppliers = await suppliersRes.json();
        dataStore.offers = await offersRes.json();

        dataStore.buyers = [
          {
            id: state.buyerId,
            name: 'Demo Buyer',
            language: 'ru',
            role: 'buyer',
            created_at: new Date().toISOString()
          }
        ];

        return true;
      } catch {
        return false;
      }
    }

    function searchOffers(query) {
      const q = query.trim().toLowerCase();
      if (!q) return [];

      return dataStore.offers.filter(o =>
        (o.model || '').toLowerCase().includes(q)
      );
    }

    function getOfferById(offerId) {
      return dataStore.offers.find(o => o.id === offerId);
    }

    function getOrCreateChat(offerId, supplierId, buyerId) {
      let chat = dataStore.chats.find(c =>
        c.offer_id === offerId &&
        c.supplier_id === supplierId &&
        c.buyer_id === buyerId
      );

      if (!chat) {
        chat = {
          id: `thread-${offerId}-${buyerId}`,
          buyer_id: buyerId,
          supplier_id: supplierId,
          offer_id: offerId,
          status: 'active',
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        };

        dataStore.chats.push(chat);
      }

      return chat;
    }

    function translateMessage(originalText) {
      return {
        translatedText: `[AI translation] ${originalText}`,
        translationStatus: 'translated'
      };
    }

    function sendMessage({ threadId, offerId, supplierId, buyerId, senderRole, originalText, originalLanguage }) {
      const tr = translateMessage(originalText);

      const message = {
        id: `msg-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`,
        thread_id: threadId,
        chatId: threadId,
        offerId,
        supplierId,
        buyerId,
        senderRole,
        originalText,
        originalLanguage,
        translatedText: tr.translatedText,
        translatedLanguage: 'en',
        translationStatus: tr.translationStatus,
        createdAt: new Date().toISOString()
      };

      dataStore.messages.push(message);
      return message;
    }

    // UI LAYER
    const getSupplierName = (id) =>
      dataStore.suppliers.find(s => s.id === id)?.name || 'Unknown';

    function renderSearchPage(root) {
      const hero = document.createElement('section');
      hero.className = 'panel hero';
      hero.innerHTML = `
        <h1>Поиск модели</h1>
        <p>Введите модель ноутбука и выберите оффер поставщика.</p>
        <input class="search-input" placeholder="Введите модель..." value="${state.query}">
      `;

      hero.querySelector('input').oninput = (e) => {
        state.query = e.target.value;
        renderApp();
      };

      root.appendChild(hero);
      renderOffers(root, searchOffers(state.query));
    }

    function renderOffers(root, offers) {
      const panel = document.createElement('section');
      panel.className = 'panel';

      if (!state.query.trim()) {
        panel.innerHTML = '<div class="empty">Начните вводить модель для поиска офферов.</div>';
      } else if (!offers.length) {
        panel.innerHTML = '<div class="empty">По вашему запросу офферы не найдены.</div>';
      } else {
        const grid = document.createElement('div');
        grid.className = 'offers-grid';

        offers.forEach(offer => {
          const card = document.createElement('button');
          card.className = 'offer-card';
          card.innerHTML = `
            <div class="offer-model">${offer.model}</div>
            <div class="meta">Конфигурация: ${offer.configuration}</div>
            <div class="meta">Цена: ${offer.price} ${offer.currency || 'AED'}</div>
            <div class="meta">Количество: ${offer.quantity}</div>
            <div class="meta">Поставщик: ${getSupplierName(offer.supplier_id)}</div>
          `;

          card.onclick = () => {
            state.selectedOfferId = offer.id;
            renderApp();
          };

          grid.appendChild(card);
        });

        panel.appendChild(grid);
      }

      root.appendChild(panel);
    }

    function renderOfferDetail(root, offer) {
      const panel = document.createElement('section');
      panel.className = 'panel';

      panel.innerHTML = `
        <button id="back" class="btn-secondary">← Назад к поиску</button>
        <div class="offer-grid">
          <div><div class="label">Модель</div><div>${offer.model}</div></div>
          <div><div class="label">Поставщик</div><div>${getSupplierName(offer.supplier_id)}</div></div>
          <div><div class="label">Конфигурация</div><div>${offer.configuration}</div></div>
          <div><div class="label">Цена</div><div>${offer.price} ${offer.currency || 'AED'}</div></div>
          <div><div class="label">Количество</div><div>${offer.quantity}</div></div>
          <div><div class="label">Описание</div><div>${offer.description}</div></div>
        </div>
      `;

      panel.querySelector('#back').onclick = () => {
        state.selectedOfferId = null;
        renderApp();
      };

      root.appendChild(panel);
    }

    function renderChat(root, offer) {
      const thread = getOrCreateChat(offer.id, offer.supplier_id, state.buyerId);

      const panel = document.createElement('section');
      panel.className = 'panel';

      panel.innerHTML = `
        <div class="chat-title">Чат с продавцом</div>
        <div id="chatBox" class="chat-box"></div>
        <div class="chat-row">
          <input id="msgInput" class="chat-input" placeholder="Введите сообщение" />
          <button id="send" class="btn">Отправить</button>
        </div>
        <div class="actions-row">
          <button class="btn">Проверка</button>
          <button class="btn">Оплата</button>
        </div>
      `;

      const box = panel.querySelector('#chatBox');
      const msgs = dataStore.messages
        .filter(m => m.thread_id === thread.id)
        .sort((a, b) => a.createdAt.localeCompare(b.createdAt));

      if (!msgs.length) {
        box.innerHTML = '<div class="empty">Сообщений пока нет.</div>';
      }

      msgs.forEach(m => {
        const b = document.createElement('div');
        b.className = `msg ${m.senderRole === 'buyer' ? 'msg-buyer' : 'msg-supplier'}`;
        b.innerHTML = `
          <div>${m.originalText}</div>
          <div class="translated">${m.translatedText}</div>
        `;
        box.appendChild(b);
      });

      panel.querySelector('#send').onclick = () => {
        const input = panel.querySelector('#msgInput');
        const text = input.value.trim();
        if (!text) return;

        sendMessage({
          threadId: thread.id,
          offerId: offer.id,
          supplierId: offer.supplier_id,
          buyerId: state.buyerId,
          senderRole: 'buyer',
          originalText: text,
          originalLanguage: 'ru'
        });

        input.value = '';
        renderApp();
      };

      root.appendChild(panel);
    }

    function renderApp() {
      const root = document.getElementById('app');
      root.innerHTML = '';

      if (!state.selectedOfferId) {
        renderSearchPage(root);
      } else {
        const offer = getOfferById(state.selectedOfferId);
        renderOfferDetail(root, offer);
        renderChat(root, offer);
      }
    }

    (async function init() {
      const loaded = await loadDataFromSupabase();
      if (!loaded) seedFallbackData();

      const firstOffer = dataStore.offers[0];
      const firstThread = getOrCreateChat(firstOffer.id, firstOffer.supplier_id, state.buyerId);

      sendMessage({
        threadId: firstThread.id,
        offerId: firstOffer.id,
        supplierId: firstOffer.supplier_id,
        buyerId: state.buyerId,
        senderRole: 'supplier',
        originalText: 'Здравствуйте! Оффер актуален, готовы ответить на вопросы.',
        originalLanguage: 'ru'
      });

      renderApp();
    })();
  </script>
</body>
</html>
